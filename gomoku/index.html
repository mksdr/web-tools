<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오목 게임 | WebTools</title>
    <meta name="description" content="미니맥스 AI와 렌주룰을 적용한 프리미엄 로컬 오목 게임">
    <link rel="stylesheet" href="../css/tailwind.css">
    <script src="../js/theme.js" defer></script>
    <script src="rules.js" defer></script>
    <script src="ai.js" defer></script>
    <script src="gomoku.js" defer></script>
</head>
<body class="bg-google-gray dark:bg-space-deep text-google-text dark:text-gray-100 transition-colors duration-300 min-h-screen flex flex-col">
    <!-- Header -->
    <header class="border-b border-gray-200 dark:border-white/10 bg-white/60 dark:bg-space-card/50 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-6">
                <!-- Home Button -->
                <a href="../index.html" class="flex items-center space-x-2 text-gray-600 dark:text-gray-300 hover:text-indigo-600 dark:hover:text-space-accent transition-colors font-semibold text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
                    </svg>
                    <span>Home</span>
                </a>
                <span class="text-gray-300 dark:text-white/10 text-lg">|</span>
                <span class="text-lg font-bold tracking-tight">오목 게임 (Gomoku)</span>
            </div>
            
            <!-- 3-Way Theme Switcher -->
            <div class="inline-flex rounded-xl p-1 bg-gray-100 dark:bg-space-deep border border-gray-200 dark:border-white/5" id="theme-switcher">
                <button data-theme="light" class="px-3 py-1.5 text-xs font-medium rounded-lg transition-all flex items-center space-x-1.5">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
                    <span>Light</span>
                </button>
                <button data-theme="auto" class="px-3 py-1.5 text-xs font-medium rounded-lg transition-all flex items-center space-x-1.5">
                    <span>Auto</span>
                </button>
                <button data-theme="dark" class="px-3 py-1.5 text-xs font-medium rounded-lg transition-all flex items-center space-x-1.5">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    <span>Dark</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content (Two-Column Layout) -->
    <main class="flex-grow max-w-6xl w-full mx-auto px-4 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12">
            
            <!-- Left Column: Settings & Game Record (span 5) -->
            <div class="lg:col-span-5 space-y-6">
                <!-- Game Settings Card -->
                <div class="rounded-2xl bg-white/60 dark:bg-space-card/50 backdrop-blur-xl border border-white/20 dark:border-white/5 p-6 shadow-xl shadow-black/5 dark:shadow-none">
                    <h2 class="text-lg font-bold mb-4 flex items-center text-gray-800 dark:text-gray-200">
                        <svg class="w-5 h-5 mr-2 text-indigo-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                        게임 설정
                    </h2>
                    
                    <div class="space-y-4">
                        <!-- Mode Select -->
                        <div>
                            <label for="select-game-mode" class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1.5">게임 모드</label>
                            <select id="select-game-mode" class="w-full bg-gray-50 dark:bg-space-deep border border-gray-200 dark:border-white/10 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-indigo-500 transition-colors">
                                <option value="vsAI">인공지능 대전 (vs AI)</option>
                                <option value="local2P">2인용 로컬 대전</option>
                            </select>
                        </div>
                        
                        <!-- AI Difficulty -->
                        <div id="difficulty-container">
                            <label for="select-difficulty" class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1.5">AI 난이도</label>
                            <select id="select-difficulty" class="w-full bg-gray-50 dark:bg-space-deep border border-gray-200 dark:border-white/10 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-indigo-500 transition-colors">
                                <option value="easy">쉬움 (Easy)</option>
                                <option value="normal" selected>보통 (Normal)</option>
                                <option value="hard">어려움 (Hard)</option>
                            </select>
                        </div>
                        
                        <!-- Player Color -->
                        <div id="color-container">
                            <label for="select-player-color" class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1.5">나의 돌 색상 (선공/후공)</label>
                            <select id="select-player-color" class="w-full bg-gray-50 dark:bg-space-deep border border-gray-200 dark:border-white/10 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-indigo-500 transition-colors">
                                <option value="1">흑돌 (선공 - 렌주룰 제한 적용)</option>
                                <option value="2">백돌 (후공 - 제한 없음)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Game Controls Card -->
                <div class="rounded-2xl bg-white/60 dark:bg-space-card/50 backdrop-blur-xl border border-white/20 dark:border-white/5 p-6 shadow-xl shadow-black/5 dark:shadow-none">
                    <h2 class="text-lg font-bold mb-4 flex items-center text-gray-800 dark:text-gray-200">
                        <svg class="w-5 h-5 mr-2 text-indigo-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                        게임 조작
                    </h2>
                    
                    <div class="grid grid-cols-2 gap-4 mb-5">
                        <button id="btn-undo" class="flex items-center justify-center space-x-1.5 bg-gray-100 hover:bg-gray-200 dark:bg-white/5 dark:hover:bg-white/10 border border-gray-200 dark:border-white/10 rounded-xl py-2.5 px-4 text-sm font-semibold transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 010 12h-3"/>
                            </svg>
                            <span>되돌리기</span>
                        </button>
                        <button id="btn-restart" class="flex items-center justify-center space-x-1.5 bg-indigo-500 hover:bg-indigo-600 text-white rounded-xl py-2.5 px-4 text-sm font-semibold transition-colors shadow-lg shadow-indigo-500/20 dark:shadow-none">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 7.89M9 11l3-3 3 3m-3-3v12"/>
                            </svg>
                            <span>다시 시작</span>
                        </button>
                    </div>

                    <div class="space-y-3 pt-3 border-t border-gray-200 dark:border-white/5">
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-semibold text-gray-500 dark:text-gray-400">수순(번호) 표시</span>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="toggle-numbers" class="sr-only peer">
                                <div class="w-9 h-5 bg-gray-200 dark:bg-neutral-800 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-500"></div>
                            </label>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-semibold text-gray-500 dark:text-gray-400">흑 금수 위치 시각 표시</span>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="toggle-forbidden" class="sr-only peer" checked>
                                <div class="w-9 h-5 bg-gray-200 dark:bg-neutral-800 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-500"></div>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Game Notation (기보) Card -->
                <div class="rounded-2xl bg-white/60 dark:bg-space-card/50 backdrop-blur-xl border border-white/20 dark:border-white/5 p-6 shadow-xl shadow-black/5 dark:shadow-none flex flex-col">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-bold flex items-center text-gray-800 dark:text-gray-200">
                            <svg class="w-5 h-5 mr-2 text-indigo-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                            기보 (Game Record)
                        </h2>
                        
                        <div class="flex items-center space-x-1.5">
                            <button id="btn-copy-record" class="text-xs font-semibold text-indigo-600 dark:text-space-accent hover:underline flex items-center">
                                <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/>
                                </svg>
                                복사
                            </button>
                            <span class="text-gray-300 dark:text-neutral-700">|</span>
                            <button id="btn-import-record" class="text-xs font-semibold text-indigo-600 dark:text-space-accent hover:underline flex items-center">
                                <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                                </svg>
                                불러오기
                            </button>
                        </div>
                    </div>
                    
                    <!-- Scrollable Moves List -->
                    <div id="move-history-list" class="flex-grow max-h-[220px] overflow-y-auto border border-gray-100 dark:border-white/5 rounded-xl bg-gray-50/50 dark:bg-black/20 p-3 space-y-1.5 font-sans min-h-[140px]">
                        <!-- Dynamic list items -->
                    </div>
                </div>
            </div>

            <!-- Right Column: The Board (span 7) -->
            <div class="lg:col-span-7 flex flex-col items-center space-y-6">
                <!-- Status Display Bar -->
                <div class="w-full flex items-center justify-between py-3 px-5 rounded-2xl bg-white/60 dark:bg-space-card/50 backdrop-blur-xl border border-white/20 dark:border-white/5 shadow-xl shadow-black/5 dark:shadow-none">
                    <div class="flex items-center space-x-3">
                        <div id="status-turn-badge" class="w-3 h-3 rounded-full bg-neutral-800 dark:bg-neutral-100 border border-neutral-600 shadow-sm animate-pulse"></div>
                        <span id="status-message" class="text-sm text-gray-600 dark:text-gray-400 font-medium">흑돌의 차례입니다.</span>
                    </div>
                    
                    <!-- AI Thinking Indicator -->
                    <div id="ai-thinking-indicator" class="hidden items-center space-x-2 text-xs font-semibold text-indigo-600 dark:text-space-accent">
                        <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span>AI 연산 중...</span>
                    </div>
                </div>

                <!-- Gomoku Board Container -->
                <!-- A highly styled plate with responsive dimensions -->
                <div id="gomoku-board-container" class="relative w-full max-w-[500px] aspect-square mx-auto bg-[#E5B57F] dark:bg-neutral-900 border-4 border-[#A06C30] dark:border-white/5 rounded-2xl shadow-xl p-6 sm:p-8 flex items-center justify-center select-none overflow-hidden">
                    
                    <!-- Coordinates labels -->
                    <div id="coords-top" class="absolute top-1 left-6 sm:left-8 right-6 sm:right-8 h-4 flex items-center"></div>
                    <div id="coords-bottom" class="absolute bottom-1 left-6 sm:left-8 right-6 sm:right-8 h-4 flex items-center"></div>
                    <div id="coords-left" class="absolute left-1 top-6 sm:top-8 bottom-6 sm:bottom-8 w-4 flex flex-col justify-center"></div>
                    <div id="coords-right" class="absolute right-1 top-6 sm:top-8 bottom-6 sm:bottom-8 w-4 flex flex-col justify-center"></div>
                    
                    <!-- Play Grid Container -->
                    <div class="relative w-full h-full">
                        <!-- Background Grid Lines -->
                        <div id="board-lines" class="absolute inset-0 pointer-events-none"></div>
                        
                        <!-- Star Spots -->
                        <div id="star-points" class="absolute inset-0 pointer-events-none"></div>
                        
                        <!-- Playable Cells and Placed Stones -->
                        <div id="board-grid" class="absolute inset-0 z-10 grid" style="grid-template-columns: repeat(15, minmax(0, 1fr)); grid-template-rows: repeat(15, minmax(0, 1fr));">
                            <!-- Populated dynamically via JS -->
                        </div>
                    </div>
                </div>

                <!-- Renju rules info card -->
                <div class="w-full rounded-2xl bg-white/60 dark:bg-space-card/50 backdrop-blur-xl border border-white/20 dark:border-white/5 p-4 shadow-xl shadow-black/5 dark:shadow-none text-xs text-gray-500 dark:text-gray-400">
                    <span class="font-bold text-gray-700 dark:text-gray-300 block mb-1">렌주룰(Renju Rule) 안내</span>
                    흑돌(선공)의 절대적 유리함을 제한하기 위해 흑돌은 삼삼(3-3), 사사(4-4), 장목(6목 이상) 자리에 돌을 둘 수 없으며, 오직 정확히 5목을 만들어야만 승리합니다. (백돌은 제한이 없으며 장목도 승리로 인정됩니다.)
                </div>
            </div>
            
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-200 dark:border-white/10 py-8 mt-12 bg-white/30 dark:bg-space-card/20 backdrop-blur-sm">
        <div class="max-w-6xl mx-auto px-4 text-center text-sm text-gray-500 dark:text-gray-400">
            &copy; 2026 WebTools. 100% Client-Side &amp; Privacy-First.
        </div>
    </footer>
</body>
</html>
